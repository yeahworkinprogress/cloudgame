<!DOCTYPE html>
<html>
<head>
    <title>Lomba Panjat Awan Edukasi</title>
    <script src="https://www.gstatic.com/firebasejs/9.1.3/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.1.3/firebase-database-compat.js"></script>
    
    <style>
        body { 
            text-align: center; 
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; 
            background: linear-gradient(to bottom, #1e90ff, #87CEEB); 
            margin: 0; padding: 20px; color: white;
            min-height: 100vh;
        }
        
        #game-container { 
            position: relative; 
            height: 600px; 
            width: 100%; 
            max-width: 500px; 
            margin: auto; 
            border: 5px solid rgba(255,255,255,0.5); 
            background: rgba(255,255,255,0.1); 
            border-radius: 20px; 
            overflow: hidden;
            box-shadow: 0 0 20px rgba(0,0,0,0.2);
        }

        /* Visual Awan sebagai Pijakan */
        .cloud-platform {
            position: absolute;
            width: 80px;
            height: 20px;
            background: white;
            border-radius: 50px;
            opacity: 0.8;
            box-shadow: 0 5px 15px rgba(255,255,255,0.5);
        }

        .character { 
            width: 50px; 
            height: 50px; 
            position: absolute; 
            bottom: 10px; 
            transition: all 0.8s cubic-bezier(0.175, 0.885, 0.32, 1.275); 
            font-size: 40px; 
            z-index: 10;
        }

        /* Posisi Horizontal Pemain */
        #charA { left: 10%; } #charB { left: 35%; } #charC { left: 60%; } #charD { left: 85%; }

        .quiz-box { 
            margin-top: 20px; 
            padding: 20px; 
            background: white; 
            border-radius: 15px; 
            display: inline-block; 
            width: 90%; 
            max-width: 500px;
            color: #333;
            box-shadow: 0 10px 30px rgba(0,0,0,0.3);
        }

        button.opt { 
            display: block; 
            width: 100%; 
            margin: 10px 0; 
            padding: 15px; 
            cursor: pointer; 
            border-radius: 10px; 
            border: 2px solid #eee; 
            font-size: 16px; 
            font-weight: bold;
            background: #f9f9f9;
            transition: 0.3s;
        }

        button.opt:hover { background: #e0f0ff; border-color: #1e90ff; transform: translateY(-2px); }

        #pilih-peran { 
            background: rgba(255, 215, 0, 0.9); 
            padding: 15px; 
            border-radius: 10px; 
            margin-bottom: 15px;
            color: #333;
        }

        .win-dance { animation: dance 0.5s infinite; }
        @keyframes dance {
            0% { transform: translateY(0) rotate(0deg); }
            50% { transform: translateY(-20px) rotate(15deg); }
            100% { transform: translateY(0) rotate(0deg); }
        }
    </style>
</head>
<body>

    <h1>☁️ CLOUD RACE EDUKASI ☁️</h1>

    <div id="pilih-peran">
        <strong>PILIH KARAKTERMU:</strong><br><br>
        <button onclick="pilih('A')">🐱 A</button>
        <button onclick="pilih('B')">🐶 B</button>
        <button onclick="pilih('C')">🦊 C</button>
        <button onclick="pilih('D')">🐸 D</button>
    </div>

    <div id="game-container">
        <div class="cloud-platform" style="bottom: 100px; left: 5%;"></div>
        <div class="cloud-platform" style="bottom: 200px; left: 40%;"></div>
        <div class="cloud-platform" style="bottom: 300px; left: 70%;"></div>
        <div class="cloud-platform" style="bottom: 400px; left: 20%;"></div>
        <div class="cloud-platform" style="bottom: 500px; left: 55%;"></div>

        <div id="charA" class="character">🐱</div>
        <div id="charB" class="character">🐶</div>
        <div id="charC" class="character">🦊</div>
        <div id="charD" class="character">🐸</div>
    </div>

    <div class="quiz-box">
        <h2 id="question">Memuat Soal dari Spreadsheet...</h2>
        <div id="options"></div>
    </div>

    <script>
        // DATA FIREBASE KAMU
        const firebaseConfig = {
            apiKey: "AIzaSyCIuO03IS3xOk-LrMP2DnzYHvguLT4-Rzc",
            authDomain: "cloudgame-30a5d.firebaseapp.com",
            databaseURL: "https://cloudgame-30a5d-default-rtdb.firebaseio.com",
            projectId: "cloudgame-30a5d",
            storageBucket: "cloudgame-30a5d.firebasestorage.app",
            messagingSenderId: "744636805808",
            appId: "1:744636805808:web:f1dd3123b48a538ca2c175"
        };
        
        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();
        
        let role = '';
        let currentSoalIdx = 0;
        let daftarSoal = [];

        function pilih(r) {
            role = r;
            document.getElementById('pilih-peran').innerHTML = "<h3>Anda adalah Pemain " + r + "</h3>";
        }

        async function ambilSoal() {
            try {
                const res = await fetch('soal.csv');
                const teks = await res.text();
                const baris = teks.split('\n').filter(b => b.trim() !== "");
                
                daftarSoal = baris.map(b => {
                    const k = b.split(',');
                    return { q: k[0], o: [k[1], k[2], k[3]], a: k[4]?.trim() };
                });
                tampilSoal();
            } catch (e) {
                document.getElementById('question').innerText = "Gagal memuat soal. Pastikan soal.csv sudah diupload!";
            }
        }

        function tampilSoal() {
            if (daftarSoal.length === 0) return;
            let data = daftarSoal[currentSoalIdx];
            document.getElementById('question').innerText = data.q;
            let optDiv = document.getElementById('options');
            optDiv.innerHTML = '';
            
            data.o.forEach(pilihan => {
                let btn = document.createElement('button');
                btn.className = 'opt';
                btn.innerText = pilihan;
                btn.onclick = () => {
                    if(pilihan.trim() === data.a) {
                        naikKeAwan();
                    } else {
                        alert("Salah! Coba lagi.");
                    }
                    // Acak soal berikutnya
                    currentSoalIdx = Math.floor(Math.random() * daftarSoal.length);
                    tampilSoal();
                };
                optDiv.appendChild(btn);
            });
        }

        function naikKeAwan() {
            if(!role) {
                alert("Pilih karaktermu dulu di atas!");
                return;
            }
            // Update posisi ke Firebase (tambah 50px setiap benar)
            db.ref('pos/' + role).transaction(p => (p || 10) + 50);
        }

        // Pantau gerakan pemain lain secara LIVE
        db.ref('pos').on('value', (s) => {
            const d = s.val();
            if(d) {
                const players = ['A', 'B', 'C', 'D'];
                players.forEach(p => {
                    let element = document.getElementById('char' + p);
                    let position = d[p] || 10;
                    element.style.bottom = position + "px";
                    
                    // Cek jika ada yang menang (sampai atas 500px)
                    if(position >= 510) {
                        element.classList.add('win-dance');
                        document.getElementById('question').innerText = "PEMAIN " + p + " MENANG! 🎉";
                        document.getElementById('options').innerHTML = "<button onclick='resetGame()'>Main Lagi</button>";
                    }
                });
            }
        });

        function resetGame() {
            db.ref('pos').set({A:10, B:10, C:10, D:10});
            location.reload();
        }

        ambilSoal();
    </script>
</body>
</html>
