<!DOCTYPE html>
<html>
<head>
    <title>Cloud Race - Grand Finale Edition</title>
    <script src="https://www.gstatic.com/firebasejs/9.1.3/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.1.3/firebase-database-compat.js"></script>
    
    <style>
        body { text-align: center; font-family: 'Segoe UI', Arial, sans-serif; background: #1e90ff; margin: 0; overflow: hidden; height: 100vh; color: #333; }
        
        /* Area Balapan (50% Layar) */
        #game-container { position: relative; height: 50vh; width: 100%; background: linear-gradient(to bottom, #1e90ff, #87CEEB); border-bottom: 6px solid white; overflow: hidden; }
        
        .cloud-platform { position: absolute; width: 130px; height: 35px; background: white; border-radius: 50px; opacity: 0.9; box-shadow: 0 10px 20px rgba(0,0,0,0.1); transition: all 0.6s; z-index: 5; }
        .character { width: 85px; height: 85px; position: absolute; bottom: 20px; transition: all 0.6s cubic-bezier(0.175, 0.885, 0.32, 1.275); font-size: 65px; z-index: 10; }

        /* Area Kontrol (50% Layar) */
        #control-panel { display: flex; height: 50vh; width: 100%; background: #f4f4f4; }
        .player-lane { flex: 1; border-right: 2px solid #ccc; padding: 15px 10px; display: flex; flex-direction: column; justify-content: flex-start; }
        
        .lane-A { background: #ffebee; } .lane-B { background: #e3f2fd; }
        .lane-C { background: #f1f8e9; } .lane-D { background: #fffde7; }

        /* Kotak Soal - Font Besar & Tidak Terpotong */
        .question-box { min-height: 110px; display: flex; align-items: center; justify-content: center; margin-bottom: 10px; padding: 10px; background: rgba(255,255,255,0.6); border-radius: 12px; border: 2px dashed #ccc; }
        .question-text { font-size: clamp(1.2rem, 2.5vw, 1.6rem); font-weight: 800; line-height: 1.2; color: #000; word-wrap: break-word; width: 100%; }
        
        /* Tombol Jawaban Besar */
        button.opt { width: 100%; margin: 6px 0; padding: 18px 10px; font-size: 1.2rem; font-weight: bold; border-radius: 12px; border: 3px solid #bbb; cursor: pointer; background: white; box-shadow: 0 4px 0 #999; transition: 0.1s; min-height: 65px; }
        button.opt:active { transform: translateY(3px); box-shadow: 0 1px 0 #999; }

        /* Overlay Papan Skor */
        #finish-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.9); color: white; z-index: 2000; display: none; flex-direction: column; justify-content: center; align-items: center; }
        #bg-music-btn { position: fixed; top: 10px; right: 10px; z-index: 100; padding: 10px; border-radius: 50%; border: none; cursor: pointer; background: white; font-size: 20px; box-shadow: 0 4px 10px rgba(0,0,0,0.2); }
    </style>
</head>
<body>

    <button id="bg-music-btn" onclick="toggleMusic()">🎵</button>

    <div id="finish-overlay">
        <div style="background: white; color: #333; padding: 35px; border-radius: 25px; min-width: 400px; box-shadow: 0 0 30px gold;">
            <h1 style="margin-top:0; color: #d4af37;">🏆 PERINGKAT FINAL 🏆</h1>
            <div id="rank-list" style="text-align: left; margin: 25px 0;"></div>
            <button onclick="resetGameData()" style="padding:15px 40px; font-size:1.4rem; cursor:pointer; background:linear-gradient(to bottom, #ffd700, #ffa500); border:none; border-radius:15px; font-weight:bold; color:white; box-shadow: 0 5px 0 #b8860b;">TANDING LAGI</button>
        </div>
    </div>

    <div id="game-container">
        <div id="cloudA" class="cloud-platform"></div>
        <div id="cloudB" class="cloud-platform"></div>
        <div id="cloudC" class="cloud-platform"></div>
        <div id="cloudD" class="cloud-platform"></div>

        <div id="charA" class="character">🦩</div>
        <div id="charB" class="character">🦅</div>
        <div id="charC" class="character">🦚</div>
        <div id="charD" class="character">🐧</div>
    </div>

    <div id="control-panel">
        <div id="lane-A" class="player-lane lane-A"></div>
        <div id="lane-B" class="player-lane lane-B"></div>
        <div id="lane-C" class="player-lane lane-C"></div>
        <div id="lane-D" class="player-lane lane-D"></div>
    </div>

    <audio id="bgMusic" loop src="https://www.soundhelix.com/examples/mp3/SoundHelix-Song-8.mp3"></audio>
    <audio id="sfxWin" src="https://assets.mixkit.co/active_storage/sfx/2000/2000-preview.mp3"></audio>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyCIuO03IS3xOk-LrMP2DnzYHvguLT4-Rzc",
            authDomain: "cloudgame-30a5d.firebaseapp.com",
            databaseURL: "https://cloudgame-30a5d-default-rtdb.firebaseio.com",
            projectId: "cloudgame-30a5d",
            storageBucket: "cloudgame-30a5d.firebasestorage.app",
            messagingSenderId: "744636805808",
            appId: "1:744636805808:web:f1dd3123b48a538ca2c175"
        };
        
        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();
        
        let daftarSoal = [];
        let pState = { A: 0, B: 0, C: 0, D: 0 };
        let finishOrder = [];

        function toggleMusic() {
            const m = document.getElementById('bgMusic');
            if (m.paused) { m.play(); document.getElementById('bg-music-btn').innerText = "🔊"; }
            else { m.pause(); document.getElementById('bg-music-btn').innerText = "🔈"; }
        }

        async function initGame() {
            const res = await fetch('soal.csv');
            const teks = await res.text();
            const baris = teks.split('\n').filter(b => b.trim() !== "");
            daftarSoal = baris.map(b => {
                const k = b.split(',');
                return { q: k[0].trim(), o: [k[1].trim(), k[2].trim(), k[3].trim()], a: k[4].trim() };
            });
            ['A', 'B', 'C', 'D'].forEach(p => updateLane(p));
        }

        function updateLane(p) {
            const idx = pState[p];
            const lane = document.getElementById('lane-' + p);
            if (idx >= daftarSoal.length) {
                lane.innerHTML = "<h2 style='color:#27ae60'>FINISH! 🏁</h2>";
                return;
            }
            const data = daftarSoal[idx];
            lane.innerHTML = `
                <div style="font-size:12px; font-weight:bold; color:#c0392b; margin-bottom:5px;">PLAYER ${p}</div>
                <div class="question-box"><div class="question-text">${data.q}</div></div>
                ${data.o.map(opt => `<button class="opt" onclick="cek('${p}', '${opt.replace(/'/g, "\\'")}', '${data.a.replace(/'/g, "\\")}')">${opt}</button>`).join('')}
            `;
        }

        function cek(p, pilih, benar) {
            if (pilih.toLowerCase().trim() === benar.toLowerCase().trim()) {
                db.ref('pos/' + p).transaction(pos => (pos || 20) + 50);
                pState[p]++;
                updateLane(p);
            }
        }

        function resetGameData() {
            db.ref('pos').set({A: 20, B: 20, C: 20, D: 20}).then(() => {
                location.reload();
            });
        }

        db.ref('pos').on('value', (s) => {
            const d = s.val() || {};
            const names = {A: 'Burung Unta', B: 'Elang', C: 'Merak', D: 'Penguin'};
            ['A', 'B', 'C', 'D'].forEach((p, i) => {
                const pos = d[p] || 20;
                const char = document.getElementById('char' + p);
                const cloud = document.getElementById('cloud' + p);
                const left = (10 + (i * 25)); 
                
                char.style.left = left + "%";
                char.style.bottom = pos + "px";
                cloud.style.left = (left - 2) + "%";
                cloud.style.bottom = (pos - 10) + "px";

                if (pos >= 480 && !finishOrder.find(x => x.id === p)) {
                    finishOrder.push({ id: p, name: names[p] });
                    if (finishOrder.length === 1) document.getElementById('sfxWin').play();
                    if (finishOrder.length === 4) showLeaderboard();
                }
            });
        });

        function showLeaderboard() {
            const list = document.getElementById('rank-list');
            list.innerHTML = finishOrder.map((player, index) => `
                <div style="display:flex; justify-content:space-between; padding:15px; border-bottom:2px solid #eee; font-size:24px; font-weight:bold;">
                    <span>#${index + 1} ${player.
