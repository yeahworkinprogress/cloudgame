<!DOCTYPE html>
<html>
<head>
    <title>Cloud Race - Champion Edition</title>
    <script src="https://www.gstatic.com/firebasejs/9.1.3/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.1.3/firebase-database-compat.js"></script>
    
    <style>
        body { text-align: center; font-family: 'Arial', sans-serif; background: #1e90ff; margin: 0; overflow: hidden; height: 100vh; }
        #game-container { position: relative; height: 55vh; width: 100%; background: linear-gradient(to bottom, #1e90ff, #87CEEB); border-bottom: 8px solid white; }
        .cloud-platform { position: absolute; width: 120px; height: 35px; background: white; border-radius: 50px; opacity: 0.8; box-shadow: 0 10px 20px rgba(0,0,0,0.1); }
        .character { width: 80px; height: 80px; position: absolute; bottom: 20px; transition: all 0.6s cubic-bezier(0.175, 0.885, 0.32, 1.275); font-size: 60px; z-index: 10; }
        #control-panel { display: flex; height: 45vh; width: 100%; background: #eee; }
        .player-lane { flex: 1; border-right: 3px solid #ddd; padding: 10px; display: flex; flex-direction: column; justify-content: center; }
        .lane-A { background: #ffebee; } .lane-B { background: #e3f2fd; } .lane-C { background: #f1f8e9; } .lane-D { background: #fffde7; }
        .question-text { font-size: 1.1rem; font-weight: bold; margin-bottom: 15px; height: 70px; color: #333; display: flex; align-items: center; justify-content: center; }
        button.opt { width: 100%; margin: 8px 0; padding: 20px 10px; font-size: 1.2rem; font-weight: bold; border-radius: 15px; border: 4px solid #ccc; cursor: pointer; transition: 0.2s; background: white; }
        button.opt:active { transform: scale(0.95); background: #ddd; }
        #bg-music-btn { position: fixed; top: 10px; right: 10px; z-index: 100; padding: 10px; border-radius: 50%; border: none; cursor: pointer; background: white; font-size: 20px; }
    </style>
</head>
<body>

    <button id="bg-music-btn" onclick="toggleMusic()">🎵</button>

    <div id="game-container">
        <div class="cloud-platform" style="bottom: 150px; left: 15%;"></div>
        <div class="cloud-platform" style="bottom: 300px; left: 45%;"></div>
        <div class="cloud-platform" style="bottom: 450px; left: 75%;"></div>

        <div id="charA" class="character" style="left: 10%;">🦩</div>
        <div id="charB" class="character" style="left: 35%;">🦅</div>
        <div id="charC" class="character" style="left: 60%;">🦚</div>
        <div id="charD" class="character" style="left: 85%;">🐧</div>
    </div>

    <div id="control-panel">
        <div id="lane-A" class="player-lane lane-A"></div>
        <div id="lane-B" class="player-lane lane-B"></div>
        <div id="lane-C" class="player-lane lane-C"></div>
        <div id="lane-D" class="player-lane lane-D"></div>
    </div>

    <audio id="bgMusic" loop>
        <source src="https://www.soundhelix.com/examples/mp3/SoundHelix-Song-8.mp3" type="audio/mpeg">
    </audio>
    <audio id="sfxCorrect">
        <source src="https://assets.mixkit.co/active_storage/sfx/2000/2000-preview.mp3" type="audio/mpeg">
    </audio>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyCIuO03IS3xOk-LrMP2DnzYHvguLT4-Rzc",
            authDomain: "cloudgame-30a5d.firebaseapp.com",
            databaseURL: "https://cloudgame-30a5d-default-rtdb.firebaseio.com",
            projectId: "cloudgame-30a5d",
            storageBucket: "cloudgame-30a5d.firebasestorage.app",
            messagingSenderId: "744636805808",
            appId: "1:744636805808:web:f1dd3123b48a538ca2c175"
        };
        
        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();
        
        let daftarSoal = [];
        let pState = { A: 0, B: 0, C: 0, D: 0 };

        function toggleMusic() {
            const m = document.getElementById('bgMusic');
            if (m.paused) { m.play(); document.getElementById('bg-music-btn').innerText = "🔊"; }
            else { m.pause(); document.getElementById('bg-music-btn').innerText = "🔈"; }
        }

        async function initGame() {
            const res = await fetch('soal.csv');
            const teks = await res.text();
            const baris = teks.split('\n').filter(b => b.trim() !== "");
            
            daftarSoal = baris.map(b => {
                const k = b.split(',');
                // .trim() sangat penting untuk membuang spasi liar
                return { q: k[0].trim(), o: [k[1].trim(), k[2].trim(), k[3].trim()], a: k[4].trim() };
            });
            
            ['A', 'B', 'C', 'D'].forEach(p => updateLane(p));
        }

        function updateLane(p) {
            const idx = pState[p];
            const lane = document.getElementById('lane-' + p);
            if (idx >= daftarSoal.length) {
                lane.innerHTML = "<h2 style='color:#2ecc71'>FINISH! 🏁</h2>";
                return;
            }

            const data = daftarSoal[idx];
            lane.innerHTML = `
                <div style="font-size:14px; color:#e74c3c; font-weight:bold">PESERTA ${p}</div>
                <div class="question-text">${data.q}</div>
                ${data.o.map(opt => `
                    <button class="opt" onclick="cek('${p}', '${opt}', '${data.a}')">${opt}</button>
                `).join('')}
            `;
        }

        function cek(p, pilih, benar) {
            // Kita bandingkan dengan sangat teliti (hapus spasi, buat huruf kecil semua)
            if (pilih.toLowerCase().trim() === benar.toLowerCase().trim()) {
                document.getElementById('sfxCorrect').play();
                db.ref('pos/' + p).transaction(pos => (pos || 20) + 45);
                pState[p]++;
                updateLane(p);
            } else {
                // Beri getaran visual kalau salah
                const l = document.getElementById('lane-' + p);
                l.style.background = "#ffcccc";
                setTimeout(() => { l.style.background = ""; updateLane(p); }, 300);
            }
        }

        db.ref('pos').on('value', (s) => {
            const d = s.val() || {};
            ['A', 'B', 'C', 'D'].forEach(p => {
                const pos = d[p] || 20;
                document.getElementById('char' + p).style.bottom = pos + "px";
                if(pos >= 500) {
                    document.getElementById('char' + p).style.animation = "dance 0.5s infinite";
                }
            });
        });

        window.addEventListener('keydown', (e) => {
            if(e.key === 'r' || e.key === 'R') {
                db.ref('pos').set({A:20, B:20, C:20, D:20});
                location.reload();
            }
        });

        initGame();
    </script>
</body>
</html>
