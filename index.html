<!DOCTYPE html>
<html>
<head>
    <title>Cloud Race - Touchscreen Arena</title>
    <script src="https://www.gstatic.com/firebasejs/9.1.3/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.1.3/firebase-database-compat.js"></script>
    
    <style>
        body { 
            text-align: center; font-family: sans-serif; 
            background: linear-gradient(to bottom, #1e90ff, #87CEEB); 
            margin: 0; overflow: hidden; height: 100vh;
        }
        
        /* Area Balapan (Atas) */
        #game-container { 
            position: relative; height: 55vh; width: 100%; 
            background: rgba(255,255,255,0.1); border-bottom: 5px solid white;
        }

        .cloud-platform {
            position: absolute; width: 100px; height: 25px;
            background: white; border-radius: 50px; opacity: 0.7;
        }

        .character { 
            width: 80px; height: 80px; position: absolute; bottom: 20px; 
            transition: all 0.6s cubic-bezier(0.175, 0.885, 0.32, 1.275); 
            font-size: 60px; z-index: 10;
        }

        /* Area Tombol (Bawah - Dibagi 4) */
        #control-panel { 
            display: flex; height: 45vh; width: 100%; background: #f0f0f0; 
        }

        .player-lane { 
            flex: 1; border-right: 2px solid #ccc; padding: 10px;
            display: flex; flex-direction: column; justify-content: center;
        }

        .lane-A { background: #ffebee; } .lane-B { background: #e3f2fd; }
        .lane-C { background: #f1f8e9; } .lane-D { background: #fffde7; }

        .question-text { font-size: 1.2rem; font-weight: bold; margin-bottom: 10px; height: 60px; color: #333; }
        
        button.opt { 
            width: 100%; margin: 5px 0; padding: 15px 5px; 
            font-size: 1.1rem; font-weight: bold; border-radius: 10px;
            border: 3px solid #ddd; cursor: pointer;
        }
    </style>
</head>
<body>

    <div id="game-container">
        <div class="cloud-platform" style="bottom: 150px; left: 10%;"></div>
        <div class="cloud-platform" style="bottom: 300px; left: 45%;"></div>
        <div class="cloud-platform" style="bottom: 450px; left: 75%;"></div>

        <div id="charA" class="character" style="left: 10%;">🦩</div>
        <div id="charB" class="character" style="left: 35%;">🦅</div>
        <div id="charC" class="character" style="left: 60%;">🦚</div>
        <div id="charD" class="character" style="left: 85%;">🐧</div>
    </div>

    <div id="control-panel">
        <div id="lane-A" class="player-lane lane-A"></div>
        <div id="lane-B" class="player-lane lane-B"></div>
        <div id="lane-C" class="player-lane lane-C"></div>
        <div id="lane-D" class="player-lane lane-D"></div>
    </div>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyCIuO03IS3xOk-LrMP2DnzYHvguLT4-Rzc",
            authDomain: "cloudgame-30a5d.firebaseapp.com",
            databaseURL: "https://cloudgame-30a5d-default-rtdb.firebaseio.com",
            projectId: "cloudgame-30a5d",
            storageBucket: "cloudgame-30a5d.firebasestorage.app",
            messagingSenderId: "744636805808",
            appId: "1:744636805808:web:f1dd3123b48a538ca2c175"
        };
        
        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();
        
        let daftarSoal = [];
        let pState = { A: 0, B: 0, C: 0, D: 0 }; // Indeks soal tiap pemain

        async function initGame() {
            const res = await fetch('soal.csv');
            const teks = await res.text();
            const baris = teks.split('\n').filter(b => b.trim() !== "");
            daftarSoal = baris.map(b => {
                const k = b.split(',');
                return { q: k[0], o: [k[1], k[2], k[3]], a: k[4]?.trim() };
            });
            
            ['A', 'B', 'C', 'D'].forEach(p => updateLane(p));
        }

        function updateLane(p) {
            const idx = pState[p];
            const lane = document.getElementById('lane-' + p);
            if (idx >= daftarSoal.length) {
                lane.innerHTML = "<h3>FINISH! 🏁</h3>";
                return;
            }

            const data = daftarSoal[idx];
            lane.innerHTML = `
                <div style="font-size:14px; color:red; font-weight:bold">PEMAIN ${p}</div>
                <div class="question-text">${data.q}</div>
                ${data.o.map(opt => `<button class="opt" onclick="cek('${p}', '${opt.replace(/'/g, "\\'")}', '${data.a.replace(/'/g, "\\'")}')">${opt}</button>`).join('')}
            `;
        }

        function cek(p, pilih, benar) {
            if (pilih.trim() === benar) {
                db.ref('pos/' + p).transaction(pos => (pos || 20) + 45);
                pState[p]++;
                updateLane(p);
            } else {
                alert("Pemain " + p + " Salah!");
            }
        }

        db.ref('pos').on('value', (s) => {
            const d = s.val() || {};
            ['A', 'B', 'C', 'D'].forEach(p => {
                document.getElementById('char' + p).style.bottom = (d[p] || 20) + "px";
                if(d[p] >= 500) {
                    document.getElementById('char' + p).style.filter = "drop-shadow(0 0 10px gold)";
                }
            });
        });

        // Tombol reset admin (tekan R di keyboard untuk reset semua)
        window.addEventListener('keydown', (e) => {
            if(e.key === 'r' || e.key === 'R') {
                db.ref('pos').set({A:20, B:20, C:20, D:20});
                location.reload();
            }
        });

        initGame();
    </script>
</body>
</html>
