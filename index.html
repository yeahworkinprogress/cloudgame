<!DOCTYPE html>
<html>
<head>
    <title>Cloud Race - Anti Blank & Championship Pro</title>
    <script src="https://www.gstatic.com/firebasejs/9.1.3/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.1.3/firebase-database-compat.js"></script>
    
    <style>
        body { text-align: center; font-family: 'Segoe UI', Arial, sans-serif; background: #1e90ff; margin: 0; overflow: hidden; height: 100vh; }
        #game-container { position: relative; height: 50vh; width: 100%; background: linear-gradient(to bottom, #1e90ff, #87CEEB); border-bottom: 6px solid white; }
        
        .admin-reset-btn { 
            position: fixed; top: 10px; right: 10px; z-index: 1000; 
            padding: 10px 20px; background: #ff4757; color: white; 
            border: none; border-radius: 8px; font-weight: bold; cursor: pointer;
            box-shadow: 0 4px 0 #ff6b81;
        }

        .cloud-platform { position: absolute; width: 120px; height: 30px; background: white; border-radius: 50px; opacity: 0.8; z-index: 5; }
        .character { width: 80px; height: 80px; position: absolute; bottom: 20px; transition: all 0.5s ease-out; font-size: 60px; z-index: 10; text-align: center; }

        /* POSISI DEFAULT: Mencegah burung numpuk di kiri kalau koneksi telat/error */
        #cloudA { left: 8%; } #charA { left: 10%; }
        #cloudB { left: 33%; } #charB { left: 35%; }
        #cloudC { left: 58%; } #charC { left: 60%; }
        #cloudD { left: 83%; } #charD { left: 85%; }

        #control-panel { display: flex; height: 50vh; width: 100%; background: #f4f4f4; }
        .player-lane { flex: 1; border-right: 2px solid #ccc; padding: 10px; display: flex; flex-direction: column; justify-content: flex-start; overflow-y: auto; }
        
        .lane-A { background: #ffebee; } .lane-B { background: #e3f2fd; }
        .lane-C { background: #f1f8e9; } .lane-D { background: #fffde7; }

        .question-box { min-height: 80px; display: flex; align-items: center; justify-content: center; margin-bottom: 10px; padding: 10px; background: white; border-radius: 12px; box-shadow: 0 4px 0 #ddd; }
        .question-text { font-size: 1.2rem; font-weight: bold; color: #000; }
        
        button.opt { width: 100%; margin: 4px 0; padding: 12px; font-size: 1rem; font-weight: bold; border-radius: 10px; border: 3px solid #bbb; cursor: pointer; background: white; box-shadow: 0 4px 0 #999; }
        button.opt:active { transform: translateY(4px); box-shadow: none; margin-bottom: 8px; }

        #finish-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.9); color: white; z-index: 2000; display: none; flex-direction: column; justify-content: center; align-items: center; }
        .score-card { background: white; color: #333; padding: 40px; border-radius: 30px; width: 450px; box-shadow: 0 15px 50px rgba(0,0,0,0.5); }
        .rank-item { display: flex; justify-content: space-between; align-items: center; padding: 15px; margin: 10px 0; border-radius: 15px; font-size: 20px; font-weight: bold; }
        .rank-1 { background: #ffd700; color: #000; border: 2px solid #b8860b; }
        .rank-2 { background: #c0c0c0; color: #000; }
        .rank-3 { background: #cd7f32; color: #fff; }
        .rank-4 { background: #f1f2f6; color: #333; }

        .bubble-reset { margin-top: 30px; padding: 20px 40px; font-size: 1.5rem; font-weight: bold; color: white; background: #2ed573; border: none; border-radius: 50px; cursor: pointer; box-shadow: 0 10px 20px rgba(46, 213, 115, 0.4); animation: pulse 1.5s infinite; }
        @keyframes pulse { 0% { transform: scale(1); } 50% { transform: scale(1.05); } 100% { transform: scale(1); } }
        
        #music-toggle { position: fixed; top: 10px; left: 10px; z-index: 1001; background: white; border: none; padding: 10px; border-radius: 50%; cursor: pointer; font-size: 20px; box-shadow: 0 2px 5px rgba(0,0,0,0.2); }
    </style>
</head>
<body>

    <button id="music-toggle" onclick="toggleMusic()">🔇 Klik Aktifkan Musik</button>
    <button class="admin-reset-btn" onclick="resetGame()">RESET ADMIN</button>

    <audio id="bg-music" loop preload="auto">
        <source src="https://assets.mixkit.co/music/preview/mixkit-funny-game-loop-508.mp3" type="audio/mpeg">
    </audio>
    <audio id="snd-correct" preload="auto">
        <source src="https://assets.mixkit.co/active_storage/sfx/2000/2000-preview.mp3" type="audio/mpeg">
    </audio>
    <audio id="snd-wrong" preload="auto">
        <source src="https://assets.mixkit.co/active_storage/sfx/951/951-preview.mp3" type="audio/mpeg">
    </audio>
    <audio id="snd-win" preload="auto">
        <source src="https://assets.mixkit.co/active_storage/sfx/1435/1435-preview.mp3" type="audio/mpeg">
    </audio>

    <div id="finish-overlay">
        <div class="score-card">
            <h1 style="margin-top:0; font-size: 2rem;">🏆 PAPAN PERINGKAT 🏆</h1>
            <div id="rank-list"></div>
            <button class="bubble-reset" onclick="resetGame()">MAIN LAGI 🏁</button>
        </div>
    </div>

    <div id="game-container">
        <div id="cloudA" class="cloud-platform"></div><div id="charA" class="character">🦩</div>
        <div id="cloudB" class="cloud-platform"></div><div id="charB" class="character">🦅</div>
        <div id="cloudC" class="cloud-platform"></div><div id="charC" class="character">🦚</div>
        <div id="cloudD" class="cloud-platform"></div><div id="charD" class="character">🐧</div>
    </div>

    <div id="control-panel">
        <div id="lane-A" class="player-lane lane-A"></div>
        <div id="lane-B" class="player-lane lane-B"></div>
        <div id="lane-C" class="player-lane lane-C"></div>
        <div id="lane-D" class="player-lane lane-D"></div>
    </div>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyCIuO03IS3xOk-LrMP2DnzYHvguLT4-Rzc",
            authDomain: "cloudgame-30a5d.firebaseapp.com",
            databaseURL: "https://cloudgame-30a5d-default-rtdb.firebaseio.com",
            projectId: "cloudgame-30a5d",
            storageBucket: "cloudgame-30a5d.firebasestorage.app",
            messagingSenderId: "744636805808",
            appId: "1:744636805808:web:f1dd3123b48a538ca2c175"
        };
        
        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();
        
        let daftarSoal = [];
        let pState = { A: 0, B: 0, C: 0, D: 0 };
        let finishOrder = [];
        const names = {A: 'Burung Unta 🦩', B: 'Elang 🦅', C: 'Merak 🦚', D: 'Penguin 🐧'};

        function toggleMusic() {
            const music = document.getElementById('bg-music');
            const btn = document.getElementById('music-toggle');
            if (music.paused) {
                music.play().then(() => {
                    btn.innerText = "🔊 Musik Nyala";
                }).catch(e => console.log("Gagal putar musik:", e));
            } else {
                music.pause();
                btn.innerText = "🔇 Musik Mati";
            }
        }

        async function initGame() {
            try {
                const res = await fetch('soal.csv');
                if (!res.ok) throw new Error("Gagal mengambil file soal.csv");
                const teks = await res.text();
                
                // Pisahkan baris dan buang yang benar-benar kosong
                const baris = teks.split('\n').filter(b => b.trim() !== "");
                
                // Fungsi aman untuk memotong spasi (mencegah error jika kolom kosong)
                const t = (str) => (str || "").trim();

                daftarSoal = baris.map(b => {
                    const k = b.split(',');
                    // Diambil aman k[0] sampai k[5] untuk membaca 6 Kolom (A sampai F)
                    return { 
                        q: t(k[0]), // Kolom A: Pertanyaan
                        o: [t(k[1]), t(k[2]), t(k[3]), t(k[4])], // Kolom B, C, D, E: Opsi Pilihan Ganda
                        a: t(k[5])  // Kolom F: Kunci Jawaban
                    };
                });
                
                ['A', 'B', 'C', 'D'].forEach(p => updateLane(p));
            } catch (err) {
                console.error("Terjadi masalah muat soal:", err);
                ['A', 'B', 'C', 'D'].forEach(p => {
                    const lane = document.getElementById('lane-' + p);
                    if (lane) lane.innerHTML = `<br><h3 style="color:red">⚠️ Error membaca soal.csv.<br>Pastikan formatnya A=Soal, B-E=Opsi, F=Kunci!</h3>`;
                });
            }
        }

        function updateLane(p) {
            const idx = pState[p];
            const lane = document.getElementById('lane-' + p);
            
            if (daftarSoal.length === 0) return; // Jika gagal loading, hentikan

            if (idx >= daftarSoal.length) { 
                lane.innerHTML = "<h2 style='text-align:center;'>FINISH! MENUNGGU PEMAIN LAIN... ⏳</h2>"; 
                return; 
            }
            
            const data = daftarSoal[idx];
            
            // Format teks aman mencegah error tombol patah gara-gara tanda kutip (')
            const safeAns = data.a.replace(/'/g, "\\'");
            
            lane.innerHTML = `
                <div style="font-weight:bold; color:#d63031; text-align:center;">PLAYER ${p}</div>
                <div class="question-box"><div class="question-text">${data.q}</div></div>
                ${data.o.map(opt => {
                    const safeOpt = opt.replace(/'/g, "\\'");
                    return `<button class="opt" onclick="cek('${p}', '${safeOpt}', '${safeAns}')">${opt}</button>`;
                }).join('')}
            `;
        }

        function cek(p, pilih, benar) {
            const music = document.getElementById('bg-music');
            if (music.paused) music.play().catch(()=>{});

            if (pilih.toLowerCase() === benar.toLowerCase()) {
                const snd = document.getElementById('snd-correct');
                snd.currentTime = 0;
                snd.play().catch(()=>{});
                
                db.ref('pos/' + p).transaction(pos => (pos || 20) + 50);
                pState[p]++;
                updateLane(p);
            } else {
                const snd = document.getElementById('snd-wrong');
                snd.currentTime = 0;
                snd.play().catch(()=>{});
            }
        }

        function resetGame() {
            if(confirm("Reset semua posisi dan mulai game baru?")) {
                db.ref('pos').set({A: 20, B: 20, C: 20, D: 20});
            }
        }

        // Listener Firebase (Pakai perlindungan data kosong)
        db.ref('pos').on('value', (s) => {
            const val = s.val();
            // Cegah error jika database sempat kosong/terhapus
            const d = (val && typeof val === 'object') ? val : {A: 20, B: 20, C: 20, D: 20};
            const medals = ['🥇 Juara 1', '🥈 Juara 2', '🥉 Juara 3', '🏁 Juara 4'];

            // Pengecekan Admin Reset
            if (d.A === 20 && d.B === 20 && d.C === 20 && d.D === 20) {
                if (finishOrder.length > 0 || pState.A > 0 || pState.B > 0 || pState.C > 0 || pState.D > 0) {
                    finishOrder = [];
                    pState = { A: 0, B: 0, C: 0, D: 0 };
                    document.getElementById('finish-overlay').style.display = 'none';
                    if (daftarSoal.length > 0) {
                        ['A', 'B', 'C', 'D'].forEach(p => updateLane(p));
                    }
                }
            }

            // Atur Visual Posisi
            ['A', 'B', 'C', 'D'].forEach((p, i) => {
                const pos = d[p] || 20;
                const char = document.getElementById('char' + p);
                const cloud = document.getElementById('cloud' + p);
                const leftPos = (10 + (i * 25)); 
                
                if (char && cloud) {
                    char.style.left = leftPos + "%";
                    char.style.bottom = pos + "px";
                    cloud.style.left = (leftPos - 2) + "%";
                    cloud.style.bottom = (pos - 10) + "px";
                }

                // Pengecekan Finish
                if (pos >= 450 && !finishOrder.find(x => x.id === p)) {
                    finishOrder.push({ id: p, name: names[p] });
                    
                    if (finishOrder.length === 4) {
                        document.getElementById('snd-win').currentTime = 0;
                        document.getElementById('snd-win').play().catch(()=>{});
                        showLeaderboard(medals);
                    }
                }
            });
        });

        function showLeaderboard(medals) {
            const list = document.getElementById('rank-list');
            list.innerHTML = finishOrder.map((pl, i) => `
                <div class="rank-item rank-${i+1}">
                    <span>${medals[i] || 'Peserta'}</span>
                    <span>${pl.name}</span>
                </div>
            `).join('');
            
            document.getElementById('finish-overlay').style.display = 'flex';
        }

        // Mulai Game
        initGame();
    </script>
</body>
</html>
