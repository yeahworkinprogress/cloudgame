<!DOCTYPE html>
<html>
<head>
    <title>Cloud Race - Sound & Championship</title>
    <script src="https://www.gstatic.com/firebasejs/9.1.3/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.1.3/firebase-database-compat.js"></script>
    
    <style>
        body { text-align: center; font-family: 'Segoe UI', Arial, sans-serif; background: #1e90ff; margin: 0; overflow: hidden; height: 100vh; }
        #game-container { position: relative; height: 50vh; width: 100%; background: linear-gradient(to bottom, #1e90ff, #87CEEB); border-bottom: 6px solid white; }
        
        .admin-reset-btn { 
            position: fixed; top: 10px; right: 10px; z-index: 1000; 
            padding: 10px 20px; background: #ff4757; color: white; 
            border: none; border-radius: 8px; font-weight: bold; cursor: pointer;
            box-shadow: 0 4px 0 #ff6b81;
        }

        .cloud-platform { position: absolute; width: 120px; height: 30px; background: white; border-radius: 50px; opacity: 0.8; z-index: 5; }
        .character { width: 80px; height: 80px; position: absolute; bottom: 20px; transition: all 0.5s ease-out; font-size: 60px; z-index: 10; text-align: center; }

        #control-panel { display: flex; height: 50vh; width: 100%; background: #f4f4f4; }
        .player-lane { flex: 1; border-right: 2px solid #ccc; padding: 10px; display: flex; flex-direction: column; justify-content: flex-start; }
        
        .lane-A { background: #ffebee; } .lane-B { background: #e3f2fd; }
        .lane-C { background: #f1f8e9; } .lane-D { background: #fffde7; }

        .question-box { min-height: 100px; display: flex; align-items: center; justify-content: center; margin-bottom: 10px; padding: 10px; background: white; border-radius: 12px; box-shadow: 0 4px 0 #ddd; }
        .question-text { font-size: 1.3rem; font-weight: bold; color: #000; }
        
        button.opt { width: 100%; margin: 5px 0; padding: 15px; font-size: 1.1rem; font-weight: bold; border-radius: 10px; border: 3px solid #bbb; cursor: pointer; background: white; box-shadow: 0 4px 0 #999; }

        #finish-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.85); color: white; z-index: 2000; display: none; flex-direction: column; justify-content: center; align-items: center; }
        .score-card { background: white; color: #333; padding: 40px; border-radius: 30px; width: 400px; box-shadow: 0 15px 50px rgba(0,0,0,0.5); }
        .rank-item { display: flex; justify-content: space-between; align-items: center; padding: 15px; margin: 10px 0; border-radius: 15px; font-size: 24px; font-weight: bold; }
        .rank-1 { background: #ffd700; color: #000; }
        .rank-2 { background: #c0c0c0; color: #000; }
        .rank-3 { background: #cd7f32; color: #fff; }
        .rank-4 { background: #f1f2f6; color: #333; }

        .bubble-reset { margin-top: 30px; padding: 20px 40px; font-size: 1.5rem; font-weight: bold; color: white; background: #2ed573; border: none; border-radius: 50px; cursor: pointer; box-shadow: 0 10px 20px rgba(46, 213, 115, 0.4); animation: pulse 1.5s infinite; }
        @keyframes pulse { 0% { transform: scale(1); } 50% { transform: scale(1.05); } 100% { transform: scale(1); } }
        
        /* Tombol Musik */
        #music-toggle { position: fixed; top: 10px; left: 10px; z-index: 1001; background: white; border: none; padding: 10px; border-radius: 50%; cursor: pointer; font-size: 20px; box-shadow: 0 2px 5px rgba(0,0,0,0.2); }
    </style>
</head>
<body>

    <button id="music-toggle" onclick="toggleMusic()">🔊</button>
    <button class="admin-reset-btn" onclick="resetGame()">RESET ADMIN</button>

    <audio id="bg-music" loop src="https://assets.mixkit.co/music/preview/mixkit-funny-game-loop-508.mp3"></audio>
    <audio id="snd-correct" src="https://assets.mixkit.co/active_storage/sfx/2000/2000-preview.mp3"></audio>
    <audio id="snd-wrong" src="https://assets.mixkit.co/active_storage/sfx/951/951-preview.mp3"></audio>
    <audio id="snd-win" src="https://assets.mixkit.co/active_storage/sfx/1435/1435-preview.mp3"></audio>

    <div id="finish-overlay">
        <div class="score-card">
            <h1 style="margin-top:0; font-size: 2.5rem;">🏆 HASIL SKOR 🏆</h1>
            <div id="rank-list"></div>
            <button class="bubble-reset" onclick="resetGame()">RESET POSISI & MAIN LAGI 🏁</button>
        </div>
    </div>

    <div id="game-container">
        <div id="cloudA" class="cloud-platform"></div><div id="charA" class="character">🦩</div>
        <div id="cloudB" class="cloud-platform"></div><div id="charB" class="character">🦅</div>
        <div id="cloudC" class="cloud-platform"></div><div id="charC" class="character">🦚</div>
        <div id="cloudD" class="cloud-platform"></div><div id="charD" class="character">🐧</div>
    </div>

    <div id="control-panel">
        <div id="lane-A" class="player-lane lane-A"></div>
        <div id="lane-B" class="player-lane lane-B"></div>
        <div id="lane-C" class="player-lane lane-C"></div>
        <div id="lane-D" class="player-lane lane-D"></div>
    </div>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyCIuO03IS3xOk-LrMP2DnzYHvguLT4-Rzc",
            authDomain: "cloudgame-30a5d.firebaseapp.com",
            databaseURL: "https://cloudgame-30a5d-default-rtdb.firebaseio.com",
            projectId: "cloudgame-30a5d",
            storageBucket: "cloudgame-30a5d.firebasestorage.app",
            messagingSenderId: "744636805808",
            appId: "1:744636805808:web:f1dd3123b48a538ca2c175"
        };
        
        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();
        
        let daftarSoal = [];
        let pState = { A: 0, B: 0, C: 0, D: 0 };
        let finishOrder = [];

        function toggleMusic() {
            const music = document.getElementById('bg-music');
            const btn = document.getElementById('music-toggle');
            if (music.paused) {
                music.play();
                btn.innerText = "🔊";
            } else {
                music.pause();
                btn.innerText = "🔈";
            }
        }

        async function initGame() {
            const res = await fetch('soal.csv');
            const teks = await res.text();
            const baris = teks.split('\n').filter(b => b.trim() !== "");
            daftarSoal = baris.map(b => {
                const k = b.split(',');
                return { q: k[0].trim(), o: [k[1].trim(), k[2].trim(), k[3].trim()], a: k[4].trim() };
            });
            ['A', 'B', 'C', 'D'].forEach(p => updateLane(p));
        }

        function updateLane(p) {
            const idx = pState[p];
            const lane = document.getElementById('lane-' + p);
            if (idx >= daftarSoal.length) { lane.innerHTML = "<h2>FINISH! 🏁</h2>"; return; }
            const data = daftarSoal[idx];
            lane.innerHTML = `
                <div style="font-weight:bold; color:red">PEMAIN ${p}</div>
                <div class="question-box"><div class="question-text">${data.q}</div></div>
                ${data.o.map(opt => `<button class="opt" onclick="cek('${p}', '${opt.replace(/'/g, "\\'")}', '${data.a.replace(/'/g, "\\")}')">${opt}</button>`).join('')}
            `;
        }

        function cek(p, pilih, benar) {
            // Mulai musik saat klik pertama jika belum jalan (kebijakan browser)
            document.getElementById('bg-music').play().catch(()=>{});

            if (pilih.toLowerCase().trim() === benar.toLowerCase().trim()) {
                document.getElementById('snd-correct').currentTime = 0;
                document.getElementById('snd-correct').play();
                db.ref('pos/' + p).transaction(pos => (pos || 20) + 50);
                pState[p]++;
                updateLane(p);
            } else {
                document.getElementById('snd-wrong').currentTime = 0;
                document.getElementById('snd-wrong').play();
                // Opsional: Getaran atau efek visual salah
            }
        }

        function resetGame() {
            if(confirm("Reset semua posisi burung ke titik 0?")) {
                db.ref('pos').set({A: 20, B: 20, C: 20, D: 20}).then(() => {
                    location.reload();
                });
            }
        }

        db.ref('pos').on('value', (s) => {
            const d = s.val() || {A: 20, B: 20, C: 20, D: 20};
            const names = {A: 'Burung Unta 🦩', B: 'Elang 🦅', C: 'Merak 🦚', D: 'Penguin 🐧'};
            const medals = ['🥇 Juara 1', '🥈 Juara 2', '🥉 Juara 3', '🏁 Juara 4'];

            ['A', 'B', 'C', 'D'].forEach((p, i) => {
                const pos = d[p] || 20;
                const char = document.getElementById('char' + p);
                const cloud = document.getElementById('cloud' + p);
                const leftPos = (10 + (i * 25)); 
                
                char.style.left = leftPos + "%";
                char.style.bottom = pos + "px";
                cloud.style.left = (leftPos - 2) + "%";
                cloud.style.bottom = (pos - 10) + "px";

                if (pos >= 450 && !finishOrder.find(x => x.id === p)) {
                    finishOrder.push({ id: p, name: names[p] });
                    document.getElementById('snd-win').play();
                    if (finishOrder.length === 4) showLeaderboard(medals);
                }
            });
        });

        function showLeaderboard(medals) {
            const list = document.getElementById('rank-list');
            list.innerHTML = finishOrder.map((pl, i) => `
                <div class="rank-item rank-${i+1}">
                    <span>${medals[i]}</span>
                    <span>${pl.name}</span>
                </div>
            `).join('');
            document.getElementById('finish-overlay').style.display = 'flex';
        }

        initGame();
    </script>
</body>
</html>
